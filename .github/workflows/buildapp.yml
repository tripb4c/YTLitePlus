name: Build YTLitePlus (Original + selective disable)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA (ArmConverter)"
        default: "https://example.com/YouTube_decrypted.ipa"
        required: true
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: true
        required: false
        type: boolean

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15-intel
    permissions:
      contents: read

    env:
      # ⬇️ Disable only the dylibs most often linked to login/WebKit/session issues.
      # We only rename these to *.off after staging; everything else stays 100% original.
      DISABLE_DYLIBS_REGEX: "Return|Dislike|Sponsor|YouPiP|YTVideoOverlay|FLEX|UHD|ABConfig|GroupSettings|NoTracking"

    steps:
      - name: Checkout (keep submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make jq

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: SDK
        uses: actions/cache@v3
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK (if cache miss)
        if: steps.SDK.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        env:
          THEOS: ${{ github.workspace }}/theos
        run: ./theos-jailed/install

      - name: Put GNU make in PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo 'export PATH="/usr/local/opt/make/libexec/gnubin:$PATH"' >> ~/.bash_profile)
          source ~/.bash_profile || true

      # ---------- Prepare base IPA (no stripping, no plist edits) ----------
      - name: Capture YT IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$URL_YT"
          echo "URL_YT=$URL_YT" >> "$GITHUB_ENV"

      - name: Prepare YouTube IPA (keep PlugIns, keep plist)
        run: |
          set -euxo pipefail
          mkdir -p tmp
          if ! wget "$URL_YT" --quiet -o /dev/null -O YouTube.ipa ; then
            curl -L "$URL_YT" -o YouTube.ipa
          fi
          unzip -q YouTube.ipa -d tmp
          # Read CFBundleVersion for artifact naming (best-effort)
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist" >/dev/null 2>&1; then
            ver=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist")
            echo "YT_VERSION=$ver" >> "$GITHUB_ENV"
          else
            echo "YT_VERSION=unknown" >> "$GITHUB_ENV"
          fi

      # ---------- Let original project build with its submodules ----------
      # We don't sed the Makefile or delete PlugIns/signatures. Keep it original.
      - name: Build (original scheme, jailed rootless)
        id: theos_build
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          export MAKEFLAGS=-j$(sysctl -n hw.ncpu)
          rm -rf packages && mkdir -p packages
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 | tee build.log || true

          echo "==> After make, list packages:"
          ls -lah packages || true

          # If Theos already produced an IPA, capture name and continue to pruning step.
          if ls packages/*.ipa >/dev/null 2>&1 ; then
            echo "ipa_ready=1" >> "$GITHUB_OUTPUT"
            echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"
          else
            echo "ipa_ready=0" >> "$GITHUB_OUTPUT"
          fi

      # ---------- If needed, gather staged Payload for pruning ----------
      - name: Locate staged YouTube.app (from tmp/ or .theos/staging)
        id: locate_stage
        run: |
          set -euxo pipefail
          APPDIR=
          if [ -d "tmp/Payload/YouTube.app" ]; then
            APPDIR="tmp/Payload/YouTube.app"
          elif [ -d ".theos/staging/Applications/YouTube.app" ]; then
            APPDIR=".theos/staging/Applications/YouTube.app"
          fi
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          test -n "$APPDIR"

      # ---------- PRUNE ONLY selected dylibs that commonly break login ----------
      - name: Disable only problematic dylibs (rename to .off)
        if: ${{ steps.locate_stage.outcome == 'success' }}
        run: |
          set -euxo pipefail
          APPDIR="${APPDIR:?}"
          echo "==> Listing injected dylibs under ${APPDIR}"
          find "$APPDIR" -type f -name "*.dylib" | sort | tee all_dylibs.txt || true

          # Only disable if name matches our regex
          if [ -s all_dylibs.txt ]; then
            grep -E "${DISABLE_DYLIBS_REGEX}" all_dylibs.txt || true
            while IFS= read -r f; do
              if echo "$f" | grep -Eq "${DISABLE_DYLIBS_REGEX}"; then
                echo "Disabling: $f"
                mv "$f" "${f}.off"
              fi
            done < all_dylibs.txt
          fi

      # ---------- If no IPA yet, zip the (possibly pruned) Payload ----------
      - name: Package IPA (fallback zipper)
        if: ${{ steps.theos_build.outputs.ipa_ready != '1' }}
        run: |
          set -euxo pipefail
          mkdir -p packages
          if [ -d "tmp/Payload/YouTube.app" ]; then
            (cd tmp && /usr/bin/zip -qry ../packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload)
          elif [ -d ".theos/staging/Applications/YouTube.app" ]; then
            rm -rf Payload && mkdir -p Payload
            cp -a .theos/staging/Applications/YouTube.app Payload/
            /usr/bin/zip -qry packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload
            rm -rf Payload
          else
            echo "ERROR: Couldn't find staged app to zip."
            exit 1
          fi

      - name: Pick final artifact name
        id: pick
        run: |
          set -euxo pipefail
          if ls packages/*.ipa >/dev/null 2>&1; then
            echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: No IPA in packages/"; exit 1
          fi
          echo "### Base YT: ${YT_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "### Disabled dylibs regex: ${DISABLE_DYLIBS_REGEX}" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifact: $(ls -t packages | head -n1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: YTLitePlus_pruned_${{ env.YT_VERSION }}
          path: packages/${{ steps.pick.outputs.package }}
          if-no-files-found: error
