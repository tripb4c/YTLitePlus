name: Build YTLitePlus (Light • YTLite core only)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL to your ArmConverter decrypted YouTube IPA"
        default: "https://example.com/path/to/your/YouTube_decrypted.ipa"
        required: true
        type: string
      upload_artifact:
        description: "Upload IPA as Workflow Artifact"
        default: true
        required: false
        type: boolean

jobs:
  build:
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      # --- Source & toolchain -------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make jq

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: SDK
        uses: actions/cache@v3
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK (if cache miss)
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Put GNU make in PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          (echo 'export PATH="/usr/local/opt/make/libexec/gnubin:$PATH"' >> ~/.bash_profile)
          source ~/.bash_profile

      # --- Bring in your ArmConverter IPA (untouched) -------------------------
      - name: Capture your decrypted IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' $GITHUB_EVENT_PATH)"
          echo ::add-mask::$URL_YT
          echo "URL_YT=$URL_YT" >> $GITHUB_ENV

      - name: Prepare YouTube IPA (no stripping, no plist edits)
        run: |
          set -euxo pipefail
          mkdir -p tmp
          wget "$URL_YT" --quiet -O YouTube_decrypted.ipa || curl -L "$URL_YT" -o YouTube_decrypted.ipa
          unzip -q YouTube_decrypted.ipa -d tmp

          # Best-effort: capture version for artifact name
          if /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "tmp/Payload/YouTube.app/Info.plist" >/dev/null 2>&1; then
            echo "YT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" tmp/Payload/YouTube.app/Info.plist)" >> $GITHUB_ENV
          else
            echo "YT_VERSION=unknown" >> $GITHUB_ENV
          fi

      # --- Fetch YTLite core and stage it ------------------------------------
      - name: Fetch YTLite core (latest release)
        run: |
          set -euxo pipefail
          mkdir -p Tweaks/YTLite
          # Fetch latest vX.Y tag; strip the leading 'v'
          YTLITE_VERSION=$(curl -s https://api.github.com/repos/dayanch96/YTLite/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          test -n "$YTLITE_VERSION"
          echo "YTLITE_VERSION=$YTLITE_VERSION" >> $GITHUB_ENV
          curl -L -o Tweaks/YTLite/ytlite.deb "https://github.com/dayanch96/YTLite/releases/download/v${YTLITE_VERSION}/com.dvntm.ytlite_${YTLITE_VERSION}_iphoneos-arm64.deb"
          tar -xf Tweaks/YTLite/ytlite.deb -C Tweaks/YTLite || true
          tar -xf Tweaks/YTLite/data.tar* -C Tweaks/YTLite
          test -f Tweaks/YTLite/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib

      # --- Provide a minimal Theos project on-the-fly (only YTLite injected) --
      - name: Guard: provide minimal Makefile + files
        run: |
          set -euxo pipefail
          cat > Makefile <<'MK'
export TARGET = iphone:clang:18.6:14.0
export SDK_PATH = $(THEOS)/sdks/iPhoneOS18.6.sdk/
export SYSROOT = $(SDK_PATH)
export ARCHS = arm64

PACKAGE_NAME = YTLitePlus
PACKAGE_VERSION = 1.0
INSTALL_TARGET_PROCESSES = YouTube
TWEAK_NAME = YTLitePlus

# Keep stock identity so extensions match during install/login
DISPLAY_NAME = YouTube
BUNDLE_ID    = com.google.ios.youtube

# Minimal: just a placeholder file so Theos builds
YTLitePlus_FILES = dummy.m
YTLitePlus_FRAMEWORKS = UIKit Security

# ---- Inject ONLY YTLite core (no other tweaks) ----
YTLitePlus_INJECT_DYLIBS = Tweaks/YTLite/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib

# Leave app resources/signature/plug-ins untouched
YTLitePlus_CFLAGS = -fobjc-arc
YTLitePlus_IPA = ./tmp/Payload/YouTube.app

include $(THEOS)/makefiles/common.mk
include $(THEOS_MAKE_PATH)/tweak.mk

FINALPACKAGE = 1
CODESIGN_IPA = 0
MK

          printf "%s\n" "// intentionally empty" > dummy.m

          # Filter: inject into com.google.ios.youtube
          cat > YTLitePlus.plist <<'PL'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
 "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>Filter</key>
  <dict>
    <key>Bundles</key>
    <array>
      <string>com.google.ios.youtube</string>
    </array>
  </dict>
</dict>
</plist>
PL

          # Minimal control so make package works
          cat > control <<'CTL'
Package: com.tripb4c.ytliteplus.light
Name: YTLitePlus-Light
Version: 1.0
Architecture: iphoneos-arm64
Description: YouTube + YTLite core only (light build)
Maintainer: Isaac <you@example.com>
Author: Isaac <you@example.com>
Section: Tweaks
Priority: optional
Depends: firmware (>= 14.0)
CTL

      # --- Build and guarantee an IPA artifact --------------------------------
      - name: Build Package (Theos) — with guaranteed fallback
        id: build_package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          export MAKEFLAGS=-j$(sysctl -n hw.ncpu)
          rm -rf packages && mkdir -p packages
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 | tee build.log

          echo "==> Outputs after make"
          echo "packages/:"
          ls -lah packages || true
          echo "tmp/ top files:"
          find tmp -maxdepth 3 -type f | head -n 50 || true
          echo ".theos/staging top files:"
          find .theos/staging -maxdepth 3 -type f 2>/dev/null | head -n 50 || true

          # If Theos already produced an IPA:
          if ls packages/*.ipa >/dev/null 2>&1; then
            echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fallback: zip staged Payload (contains our injected changes)
          if [ -d "tmp/Payload/YouTube.app" ]; then
            pushd tmp >/dev/null
            /usr/bin/zip -qry ../packages/YTLitePlus_light_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}.ipa Payload
            popd >/dev/null
            echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -d ".theos/staging/Applications/YouTube.app" ]; then
            rm -rf Payload && mkdir -p Payload
            cp -a .theos/staging/Applications/YouTube.app Payload/
            /usr/bin/zip -qry packages/YTLitePlus_light_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}.ipa Payload
            rm -rf Payload
            echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ERROR: No IPA produced and no staged app found. See build.log."
          echo "package=" >> $GITHUB_OUTPUT
          exit 1

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: YTLitePlus_light_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}
          path: packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error
