# Original idea by @ISnackable. Many thanks to him for handling the most hardest parts!
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release YTLitePlus

on:
  workflow_dispatch:
    inputs:
      # ===== NEW: choose which tweaks to disable this run =====
      disable_profile:
        description: "Which tweaks to disable for this build?"
        required: true
        type: choice
        options:
          - Minimal (stable baseline)
          - Disable Group A (UI/Settings)
          - Disable Group B (Playback/PiP/RYD/FLEX)
          - None (enable everything)
          - Custom (use custom_disable_regex)
        default: Disable Group B (Playback/PiP/RYD/FLEX)
      custom_disable_regex:
        description: "If 'Custom', paste a regex of dylib names to disable (e.g. YTUHD|YouPiP)"
        required: false
        type: string
      # ===== Original inputs =====
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA (Dropbox/Catbox etc.)"
        default: "https://files.catbox.moe/5a8qlt.ipa"
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact (Public)"
        default: false
        required: false
        type: boolean
      catbox_upload:
        description: "Upload IPA to Catbox.moe (URL)"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release (Private)"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install ldid dpkg make jq curl unzip

      - name: Download Theos
        uses: actions/checkout@v6.0.1
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: iOS SDK Caching
        id: SDK
        uses: actions/cache@v5.0.2
        with:
          path: theos/sdks/
          key: iOS-${{ inputs.sdk_version }}-SDK
          restore-keys: iOS-${{ inputs.sdk_version }}-SDK

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
          SDK_VER: ${{ inputs.sdk_version }}
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone "iPhoneOS${SDK_VER}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v6.0.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          ./theos-jailed/install
        
      - name: Fix Compiling
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          # Update GNU Make to allow for faster building
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo export PATH="/usr/local/opt/make/libexec/gnubin:$PATH" >> ~/.bash_profile)
          source ~/.bash_profile

      # === Use original input URL, but make it safe: unescape &amp; and force Dropbox dl=1 ===
      - name: Hash YT IPA URL (normalize &amp; and Dropbox dl=1)
        run: |
          set -euo pipefail
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' "$GITHUB_EVENT_PATH")"

          # Mask original
          echo "::add-mask::$URL_YT"

          # 1) Unescape '&amp;' -> '&'
          URL_YT="${URL_YT//&amp;/&}"

          # 2) Normalize Dropbox links to exactly one dl=1 (pure Bash)
          if [[ "$URL_YT" =~ ^https?://www\.dropbox\.com/ ]]; then
            base="${URL_YT%%\?*}"
            if [[ "$base" == "$URL_YT" ]]; then
              URL_YT="${base}?dl=1"
            else
              query="${URL_YT#*\?}"
              query="&${query}&"
              query="${query//&dl=[^&]*/&}"
              query="${query//&&/&}"
              query="${query#&}"; query="${query%&}"
              if [[ -n "$query" ]]; then
                URL_YT="${base}?${query}&dl=1"
              else
                URL_YT="${base}?dl=1"
              fi
            fi
          fi

          # Export normalized URL
          echo "YOUTUBE_URL=$URL_YT" >> "$GITHUB_ENV"
          echo "::add-mask::$URL_YT"

      - name: Prepare YouTube IPA
        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ env.YOUTUBE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          # Download IPA (curl with retries)
          curl -L --fail --retry 5 --retry-delay 3 \
            -H "User-Agent: YTLitePlus-CI" \
            "$YOUTUBE_URL" -o YouTube.ipa

          # Sanity check to catch HTML pages / wrong link
          MIN_SIZE=$((10 * 1024 * 1024))
          ACT_SIZE=$(stat -f%z YouTube.ipa)
          if [ "$ACT_SIZE" -lt "$MIN_SIZE" ]; then
            echo "Downloaded file looks too small ($ACT_SIZE bytes)."
            echo "If using Dropbox, ensure it is a direct link; we force dl=1 automatically."
            exit 1
          fi

          # Unzip to tmp/Payload/YouTube.app
          unzip -q YouTube.ipa -d tmp
          test -d tmp/Payload/YouTube.app || { echo "YouTube.app not found in IPA"; ls -lah tmp; exit 1; }

          # Read YouTube CFBundleVersion -> YT_VERSION
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' tmp/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> "$GITHUB_ENV"

          # Authenticated fetch of latest YTLite tag (avoid rate-limit / anon failures)
          YTLITE_VERSION=$(curl -sS --fail \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "User-Agent: YTLitePlus-CI" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dayanch96/YTLite/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')

          if [ -z "$YTLITE_VERSION" ] || [ "$YTLITE_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest YTLite version from GitHub API"
            exit 1
          fi
          echo "YTLITE_VERSION=$YTLITE_VERSION" >> "$GITHUB_ENV"
          echo "Fetched YTLite version: $YTLITE_VERSION"

          # Clean items that interfere with sideloading
          rm -rf tmp/Payload/YouTube.app/_CodeSignature/CodeResources
          rm -rf tmp/Payload/YouTube.app/PlugIns/*

          # Remove UISupportedDevices from Info.plist
          python - <<'EOF'
          import plistlib
          filepath = 'tmp/Payload/YouTube.app/Info.plist'
          with open(filepath, 'rb') as f:
              plist = plistlib.load(f)
          plist.pop('UISupportedDevices', None)
          with open(filepath, 'wb') as f:
              plistlib.dump(plist, f)
          EOF

          # Re‑add the "Open in YouTube" extension
          cp -R Extensions/*.appex tmp/Payload/YouTube.app/PlugIns

      # ===== NEW: decide which tweaks to disable this run =====
      - name: Decide disabled tweaks
        id: disable_set
        env:
          CHOICE: ${{ github.event.inputs.disable_profile }}
          CUSTOM: ${{ github.event.inputs.custom_disable_regex }}
        run: |
          set -euo pipefail
          case "${CHOICE}" in
            "Minimal (stable baseline)")
              # Keep only core + settings framework; turn off everything else for stability
              DISABLE="libFLEX|YTUHD|YouPiP|YouGroupSettings|YTVideoOverlay|YouTimeStamp|DontEatMyContent|YTABConfig|YouTubeDislikesReturn"
              ;;
            "Disable Group A (UI/Settings)")
              # UI/Settings group
              DISABLE="YTVideoOverlay|YouGroupSettings|YTABConfig|YouTimeStamp|DontEatMyContent"
              ;;
            "Disable Group B (Playback/PiP/RYD/FLEX)")
              # Playback & tools group
              DISABLE="YTUHD|YouPiP|YouTubeDislikesReturn|libFLEX"
              ;;
            "None (enable everything)")
              DISABLE=""
              ;;
            "Custom (use custom_disable_regex)")
              DISABLE="${CUSTOM}"
              ;;
            *)
              DISABLE=""
              ;;
          esac
          echo "regex=${DISABLE}" >> "$GITHUB_OUTPUT"
          # Mask it in logs (can include repo-specific names)
          if [ -n "${DISABLE}" ]; then
            echo "::add-mask::${DISABLE}"
          fi
          echo "Using DISABLE_DYLIBS_REGEX='${DISABLE:-<none>}'"

      - name: Build Package
        id: build_package
        env:
          THEOS: ${{ github.workspace }}/theos
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}
          SDK_VER: ${{ inputs.sdk_version }}
          # pass the resolved regex into this step
          DISABLE_REGEX: ${{ steps.disable_set.outputs.regex }}
        run: |
          set -euxo pipefail

          # Apply the chosen disable set (may be empty to enable everything)
          if [ -n "${DISABLE_REGEX:-}" ]; then
            export DISABLE_DYLIBS_REGEX="${DISABLE_REGEX}"
          fi

          # Patch Makefile from inputs
          sed -i '' "s/^BUNDLE_ID.*$/BUNDLE_ID = ${BUNDLE_ID}/" Makefile
          sed -i '' "s/^DISPLAY_NAME.*$/DISPLAY_NAME = ${APP_NAME}/" Makefile
          sed -i '' "s/^PACKAGE_VERSION.*$/PACKAGE_VERSION = ${YT_VERSION}-${YTLITE_VERSION}/" Makefile
          sed -i '' "s/^export TARGET.*$/export TARGET = iphone:clang:${SDK_VER}:14.0/" Makefile
          sed -i '' "s|^export SDK_PATH.*$|export SDK_PATH = \$(THEOS)/sdks/iPhoneOS${SDK_VER}.sdk/|" Makefile

          # Build
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 YTLITE_VERSION="${YTLITE_VERSION}"

          # Rename to friendly name (ignore error if already matched)
          mv "packages/$(ls -t packages | head -n1)" "packages/YTLitePlus_${YT_VERSION}_${YTLITE_VERSION}.ipa" || true

          # Expose final name to later steps
          echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"

          # Show hash & bundle id
          echo "==> SHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')"
          echo "==> Bundle ID: ${BUNDLE_ID}"

      - name: Upload Artifact (optional flag)
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4.5.0
        with:
          name: YTLitePlus_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}
          path: packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error
          
      - name: Upload Artifact to Catbox and update AltStore repo (optional flag)
        if: ${{ inputs.catbox_upload }}
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          set -euxo pipefail
          RESPONSE=$(curl -F "reqtype=fileupload" -F "fileToUpload=@packages/${{ steps.build_package.outputs.package }}" https://catbox.moe/user/api.php)
          CATBOX_URL=$(echo "$RESPONSE" | grep -o -E 'https://files.catbox.moe/[^"]*' || true)
          if [ -z "$CATBOX_URL" ]; then
            echo "Catbox upload did not return a URL. Response: $RESPONSE"
            exit 1
          fi
          echo "Uploaded artifact to $CATBOX_URL"
          CATBOX_FILE=$(echo "$CATBOX_URL" | sed 's|https://files.catbox.moe/||')
          echo "CATBOX_FILE=$CATBOX_FILE" >> "$GITHUB_ENV"
          echo "CATBOX_URL=$CATBOX_URL" >> "$GITHUB_ENV"
      
          # Trigger AltStore source update (safe JSON via jq)
          jq -n \
            --arg ref "main" \
            --arg url "$CATBOX_URL" \
            --arg ylp "${YTLITE_VERSION}" \
            --arg yv "${YT_VERSION}" \
            '{ref:$ref, inputs:{yt_lite_plus_url:$url, yt_lite_plus_version:$ylp, yt_version:$yv}}' \
          | curl -sS -X POST \
              -H "Authorization: token ${PERSONAL_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @- \
              "https://api.github.com/repos/Balackburn/YTLitePlusAltstore/actions/workflows/update_source.yml/dispatches"

      - name: Prepare Release Notes (optional flag)
        if: ${{ inputs.create_release }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          sed "s/%ytliteplus_version%/${YTLITE_VERSION}/g; s/%youtube_version%/${YT_VERSION}/g; s/%catbox_url%/${CATBOX_FILE}/g; s/%date%/$TODAY/g" \
            .github/RELEASE_TEMPLATE/Release.md > release_notes.md

      - name: Create Draft Release (optional flag)
        if: ${{ inputs.create_release }}
        id: create_release
        uses: softprops/action-gh-release@v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}
          name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }} - YTLitePlus
          files: packages/*.ipa
          draft: true
          body_path: release_notes.md

      - name: Job Summary
        run: |
          {
            echo '### Build Complete'
            echo
            echo "Disable profile: ${{ inputs.disable_profile }}"
            if [ "${{ inputs.disable_profile }}" = "Custom (use custom_disable_regex)" ]; then
              echo "Custom regex: ${{ inputs.custom_disable_regex }}"
            fi
            echo
            echo "YouTube: ${YT_VERSION}"
            echo "YTLite:  ${YTLITE_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
