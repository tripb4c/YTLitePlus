name: Build YTLitePlus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        brew install dpkg ldid theos jq

    - name: Build (fetch tag via API, then make)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISABLE_DYLIBS_REGEX: "libFLEX|YTUHD|YouPiP|YouGroupSettings|YTVideoOverlay"

      run: |
        set -euxo pipefail

        echo "==> Fetching latest YTLite tag from GitHub API..."

        YTLITE_VERSION=$(curl -sS --fail \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "User-Agent: YTLitePlus-CI" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/YTLite/YTLite/releases/latest \
          | jq -r '.tag_name')

        if [ -z "${YTLITE_VERSION}" ] || [ "${YTLITE_VERSION}" = "null" ]; then
          echo "ERROR: Could not get latest YTLite version from GitHub API."
          exit 1
        fi

        echo "Using YTLITE_VERSION=${YTLITE_VERSION}"

        export MAKEFLAGS=-j$(($(sysctl -n hw.ncpu)-1))

        rm -rf packages
        mkdir -p packages

        make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 \
          YTLITE_VERSION="${YTLITE_VERSION}" | tee build.log

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ytliteplus-output
        path: |
          packages/
          build.log
