name: Build and Release YTLitePlus

on:
  workflow_dispatch:
    inputs:
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA (Catbox/Dropbox/etc.)"
        default: "https://files.catbox.moe/5a8qlt.ipa"
        required: true
        type: string
      bundle_id:
        description: "Bundle identifier to use"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "App display name"
        default: "YouTube"
        required: true
        type: string
      sdk_version:
        description: "iOS SDK version to build against"
        default: "18.6"
        required: true
        type: string
      ytlite_version:
        description: "(Optional) Pin a YTLite tag (e.g., 5.1.3). Leave blank for latest."
        default: ""
        required: false
        type: string
      core_mode:
        description: "Core mode"
        required: true
        type: choice
        options:
          - "Full"
          - "Core-Lite (safer)"
        default: "Core-Lite (safer)"
      disable_profile:
        description: "Disable a set of tweaks (regex applied to built dylibs)"
        required: true
        type: choice
        options:
          - "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)"
          - "Minimal (stable baseline)"
          - "Disable Group A (UI/Settings)"
          - "Disable Group B (Playback/PiP/RYD/FLEX)"
          - "None (enable everything)"
          - "Custom (use custom_disable_regex)"
        default: "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)"
      custom_disable_regex:
        description: "If Custom, regex of dylib names to disable (e.g. YTUHD|YouPiP)"
        required: false
        type: string
      create_release:
        description: "Create a draft GitHub Release"
        default: true
        required: false
        type: boolean
      catbox_upload:
        description: "Upload IPA to Catbox (optional)"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15
    permissions:
      contents: write

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          brew update
          brew install jq curl unzip ldid dpkg gnu-sed make
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk_cache
        uses: actions/cache@v4
        with:
          path: theos/sdks/
          key: iphoneos-${{ inputs.sdk_version }}-sdk

      - name: Fetch iOS SDK (if cache missed)
        if: steps.sdk_cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/ sdks-src
          cd sdks-src
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          set -euxo pipefail
          ./theos-jailed/install

      - name: Normalize decrypted IPA URL
        id: urlprep
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ inputs.decrypted_youtube_url }}"
          # Unescape "&amp;" -> "&"
          RAW="${RAW//&amp;/&}"
          # Dropbox: preserve all params (incl. rlkey=) and force dl=1
          if [[ "$RAW" =~ ^https?://www\.dropbox\.com/ ]]; then
            if [[ "$RAW" == *\?* ]]; then
              if [[ "$RAW" =~ ([\?&])dl= ]]; then
                RAW="$(echo "$RAW" | sed -E 's/([?&])dl=[^&]*/\1dl=1/g')"
              else
                RAW="${RAW}&dl=1"
              fi
            else
              RAW="${RAW}?dl=1"
            fi
          fi
          echo "YOUTUBE_URL=$RAW" >> "$GITHUB_ENV"
          echo "::add-mask::$RAW"

      - name: Download and unpack YouTube IPA
        shell: bash
        run: |
          set -euxo pipefail
          if [ -z "${YOUTUBE_URL:-}" ]; then
            echo "::error::YOUTUBE_URL is empty. URL normalization step did not export it."
            exit 1
          fi
          echo "YOUTUBE_URL starts with: ${YOUTUBE_URL:0:100}..."

          try_download () {
            local URL="$1"
            local OUT="$2"
            local HDR="$3"

            rm -f "$OUT" "$HDR"
            curl -L --fail --retry 5 --retry-delay 3 \
              -D "$HDR" \
              -H "User-Agent: YTLitePlus-CI" \
              "$URL" -o "$OUT"

            echo "==> Response headers (first lines) for $URL:"
            sed -n '1,25p' "$HDR" || true

            if grep -qiE '^Content-Type:\s*text/html' "$HDR"; then
              return 2
            fi

            local MIN=$((10*1024*1024))
            local ACT
            ACT=$(stat -f%z "$OUT")
            if [ "$ACT" -lt "$MIN" ]; then
              return 3
            fi

            rm -rf tmp || true
            unzip -q "$OUT" -d tmp
            test -d tmp/Payload/YouTube.app || return 4

            return 0
          }

          # Primary attempt
          if try_download "$YOUTUBE_URL" "YouTube.ipa" "headers.txt"; then
            echo "==> Primary download OK"
          else
            RC=$?
            echo "==> Primary download failed (code $RC)"
            # Dropbox fallback to raw host
            if [[ "$YOUTUBE_URL" =~ ^https?://www\.dropbox\.com/ ]]; then
              ALT_URL="$(echo "$YOUTUBE_URL" | sed -E 's#^https://www\.dropbox\.com#https://dl.dropboxusercontent.com#')"
              echo "Trying Dropbox raw host: ${ALT_URL:0:120}..."
              if try_download "$ALT_URL" "YouTube.ipa" "headers_retry.txt"; then
                echo "==> Fallback download OK"
              else
                RC2=$?
                echo "::error::Dropbox served a landing page or a too-small file (primary RC=$RC, fallback RC=$RC2)."
                echo "Tips:"
                echo "  - Ensure the link is a FILE share (not a folder)."
                echo "  - Keep the rlkey=... parameter."
                echo "  - Or upload to Catbox and paste that direct URL."
                exit 1
              fi
            else
              echo "::error::Failed to fetch IPA (non-Dropbox URL). Check the link or try Catbox."
              exit 1
            fi
          fi

          # Parse CFBundleVersion
          YT_VERSION=$(python3 -c 'import plistlib; p="tmp/Payload/YouTube.app/Info.plist"; print(plistlib.load(open(p,"rb")).get("CFBundleVersion","0"))')
          echo "YT_VERSION=${YT_VERSION}" >> "$GITHUB_ENV"

          # Clean up signatures / plugins
          rm -rf tmp/Payload/YouTube.app/_CodeSignature || true
          rm -rf tmp/Payload/YouTube.app/PlugIns/* || true

          # Remove UISupportedDevices (some SDKs choke on it)
          python3 -c 'import plistlib; p="tmp/Payload/YouTube.app/Info.plist"; pl=plistlib.load(open(p,"rb")); pl.pop("UISupportedDevices",None); plistlib.dump(pl,open(p,"wb"))'

          # Re-add local Extensions if present
          if [ -d "Extensions" ] && compgen -G "Extensions/*.appex" > /dev/null; then
            mkdir -p tmp/Payload/YouTube.app/PlugIns
            cp -R Extensions/*.appex tmp/Payload/YouTube.app/PlugIns || true
          fi

      - name: Pre-download YTLite .deb (pinned or latest) and verify
        id: ytlitedeb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          owner="dayanch96"
          repo="YTLite"

          if [ -n "${{ inputs.ytlite_version }}" ]; then
            tag="v${{ inputs.ytlite_version }}"
          else
            tag="$(curl -sS --fail \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${owner}/${repo}/releases/latest" \
              | jq -r '.tag_name')"
          fi
          echo "Using YTLite tag: $tag"
          echo "YTLITE_VERSION=${tag#v}" >> "$GITHUB_ENV"

          rel_json="$(curl -sS --fail \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}")"

          api_url="$(echo "$rel_json" | jq -r '.assets[] | select(.name|endswith(".deb")) | .url' | head -n1)"
          test -n "$api_url"

          mkdir -p Tweaks/YTLite
          curl -L --fail --retry 5 --retry-delay 3 \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$api_url" -o Tweaks/YTLite/YTLite.deb

          file Tweaks/YTLite/YTLite.deb | grep -qi 'debian' || { echo "::error::Downloaded file is not a Debian archive"; exit 1; }

      - name: Decide disabled dylib regex from profile
        id: disable
        shell: bash
        run: |
          set -euo pipefail
          CHOICE="${{ inputs.disable_profile }}"
          CUSTOM="${{ inputs.custom_disable_regex }}"
          case "$CHOICE" in
            "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)")
              DISABLE="YTUHD|YouPiP|YouTubeDislikesReturn|libFLEX"
              ;;
            "Minimal (stable baseline)")
              DISABLE="libFLEX|YTUHD|YouPiP|YouGroupSettings|YTVideoOverlay|YouTimeStamp|DontEatMyContent|YTABConfig|YouTubeDislikesReturn"
              ;;
            "Disable Group A (UI/Settings)")
              DISABLE="YTVideoOverlay|YouGroupSettings|YTABConfig|YouTimeStamp|DontEatMyContent"
              ;;
            "Disable Group B (Playback/PiP/RYD/FLEX)")
              DISABLE="YTUHD|YouPiP|YouTubeDislikesReturn|libFLEX"
              ;;
            "None (enable everything)")
              DISABLE=""
              ;;
            "Custom (use custom_disable_regex)")
              DISABLE="$CUSTOM"
              ;;
            *)
              DISABLE=""
              ;;
          esac
          echo "DISABLE_REGEX=$DISABLE" >> "$GITHUB_ENV"
          if [ -n "$DISABLE" ]; then
            echo "::notice title=Disabled dylibs regex::$DISABLE"
          fi

      - name: Build Package (sidecar Makefile.ci; no repo Makefile)
        shell: bash
        run: |
          set -euxo pipefail

          if echo "${{ inputs.bundle_id }}" | grep -qiE 'https?://'; then
            echo "::error::Bundle ID looks like a URL. Put the URL in decrypted_youtube_url, not bundle_id."
            exit 1
          fi

          cat > Makefile.ci <<'MAKE'
          # ===== Theos / Target toolchain =====
          export TARGET      ?= iphone:clang:18.6:14.0
          export SDK_PATH    ?= $(THEOS)/sdks/iPhoneOS18.6.sdk/
          export SYSROOT     ?= $(SDK_PATH)
          export ARCHS       ?= arm64

          export libcolorpicker_ARCHS ?= $(ARCHS)
          export libFLEX_ARCHS        ?= $(ARCHS)
          export Alderis_XCODEOPTS    ?= LD_DYLIB_INSTALL_NAME=@rpath/Alderis.framework/Alderis
          export Alderis_XCODEFLAGS   ?= DYLIB_INSTALL_NAME_BASE=/Library/Frameworks BUILD_LIBRARY_FOR_DISTRIBUTION=YES ARCHS="$(ARCHS)"
          export libcolorpicker_LDFLAGS ?= -F$(TARGET_PRIVATE_FRAMEWORK_PATH) -install_name @rpath/libcolorpicker.dylib

          export ADDITIONAL_CFLAGS ?= -I$(THEOS_PROJECT_DIR)/Tweaks/RemoteLog -I$(THEOS_PROJECT_DIR)/Tweaks

          PACKAGE_NAME     ?= YTLitePlus
          PACKAGE_VERSION  ?= X.X.X-X.X
          DISPLAY_NAME     ?= YouTube
          BUNDLE_ID        ?= com.google.ios.youtube

          INSTALL_TARGET_PROCESSES = YouTube

          TWEAK_NAME = YTLitePlus

          YTLitePlus_FILES = \
            YTLitePlus.xm \
            $(shell find Source -name '*.xm' -o -name '*.x' -o -name '*.m')

          YTLitePlus_FILES := $(filter-out $(SKIP_CORE_FILES),$(YTLitePlus_FILES))

          YTLitePlus_CFLAGS = -fobjc-arc \
            -Wno-deprecated-declarations \
            -Wno-unsupported-availability-guard \
            -Wno-unused-but-set-variable \
            -DTWEAK_VERSION=$(PACKAGE_VERSION) \
            $(EXTRA_CFLAGS)

          YTLitePlus_FRAMEWORKS = UIKit Security

          YTLitePlus_INJECT_DYLIBS = \
            Tweaks/YTLite/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib \
            .theos/obj/libFLEX.dylib \
            .theos/obj/YTUHD.dylib \
            .theos/obj/YouPiP.dylib \
            .theos/obj/YouTubeDislikesReturn.dylib \
            .theos/obj/YTABConfig.dylib \
            .theos/obj/DontEatMyContent.dylib \
            .theos/obj/YTVideoOverlay.dylib \
            .theos/obj/YouTimeStamp.dylib \
            .theos/obj/YouGroupSettings.dylib

          YTLitePlus_EMBED_LIBRARIES  = $(THEOS_OBJ_DIR)/libcolorpicker.dylib
          YTLitePlus_EMBED_FRAMEWORKS = $(_THEOS_LOCAL_DATA_DIR)/$(_THEOS_OBJ_DIR_NAME)/install_Alderis.xcarchive/Products/var/jb/Library/Frameworks/Alderis.framework
          YTLitePlus_EMBED_BUNDLES    = $(wildcard Bundles/*.bundle)
          YTLitePlus_EMBED_EXTENSIONS = $(wildcard Extensions/*.appex)

          YTLitePlus_IPA = ./tmp/Payload/YouTube.app
          YTLitePlus_USE_FISHHOOK = 0

          include $(THEOS)/makefiles/common.mk

          SUBPROJECTS += \
            Tweaks/Alderis \
            Tweaks/FLEXing/libflex \
            Tweaks/YTUHD \
            Tweaks/YouPiP \
            Tweaks/Return-YouTube-Dislikes \
            Tweaks/YTABConfig \
            Tweaks/DontEatMyContent \
            Tweaks/YTVideoOverlay \
            Tweaks/YouTimeStamp \
            Tweaks/YouGroupSettings
          include $(THEOS_MAKE_PATH)/aggregate.mk

          include $(THEOS_MAKE_PATH)/tweak.mk

          FINALPACKAGE      = 1
          REMOVE_EXTENSIONS = 1
          CODESIGN_IPA      = 0

          YTLITE_PATH    := Tweaks/YTLite
          YTLITE_DEB     := $(firstword $(wildcard $(YTLITE_PATH)/*.deb))
          YTLITE_DYLIB   := $(YTLITE_PATH)/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib
          YTLITE_BUNDLE  := $(YTLITE_PATH)/var/jb/Library/Application\ Support/YTLite.bundle

          internal-clean::
            @rm -rf "$(YTLITE_PATH)"/*

          before-all::
            @mkdir -p "$(YTLITE_PATH)"; \
            if [ ! -f "$(YTLITE_DEB)" ]; then \
              echo "==> No local YTLite .deb found. Ensure pre-download step ran."; exit 1; \
            fi; \
            if [ ! -f "$(YTLITE_DYLIB)" ] || [ ! -d "$(YTLITE_BUNDLE)" ]; then \
              tar -xf "$(YTLITE_DEB)" -C "$(YTLITE_PATH)"; \
              tar -xf "$(YTLITE_PATH)/data.tar"* -C "$(YTLITE_PATH)"; \
              if [ ! -f "$(YTLITE_DYLIB)" ] || [ ! -d "$(YTLITE_BUNDLE)" ]; then \
                echo "==> Failed to extract YTLite"; exit 1; \
              fi; \
            fi

          before-package::
            @if [ -n "$(DISABLE_DYLIBS_REGEX)" ]; then \
              echo "==> Disabling dylibs matching: $(DISABLE_DYLIBS_REGEX)"; \
              find .theos -type f -name "*.dylib" | while read f; do \
                echo "$$f" | grep -Eq "($(DISABLE_DYLIBS_REGEX))" && { echo "  - removing $$f"; rm -f "$$f"; }; \
              done; \
            fi
          MAKE

          sed -n '1,40p' Makefile.ci | sed -e $'s/\t/[TAB]\t/g' | nl

          if [ "${{ inputs.core_mode }}" = "Core-Lite (safer)" ]; then
            SKIP_LIST="Source/Themes.xm Source/VersionSpooferLite.xm"
          else
            SKIP_LIST=""
          fi

          if command -v gmake >/dev/null 2>&1; then MAKE_BIN=gmake; else MAKE_BIN=make; fi

          "$MAKE_BIN" -f Makefile.ci package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 \
            BUNDLE_ID="${{ inputs.bundle_id }}" \
            DISPLAY_NAME="${{ inputs.app_name }}" \
            PACKAGE_VERSION="${YT_VERSION}-${YTLITE_VERSION}" \
            TARGET="iphone:clang:${{ inputs.sdk_version }}:14.0" \
            SDK_PATH="${THEOS}/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk/" \
            SKIP_CORE_FILES="$SKIP_LIST" \
            DISABLE_DYLIBS_REGEX="${DISABLE_REGEX}"

          OUT="$(ls -t packages | head -n1)"
          mv "packages/${OUT}" "packages/YTLitePlus_${YT_VERSION}_${YTLITE_VERSION}.ipa" || true
          echo "==> Listing packages/"
          ls -lah packages || { echo "::error::No packages directory found"; exit 1; }
          shopt -s nullglob
          IPAS=(packages/*.ipa)
          echo "==> IPA count: ${#IPAS[@]}"
          if [ ${#IPAS[@]} -eq 0 ]; then
            echo "::error::No IPA produced. Check build logs above for errors."
            exit 1
          fi
          echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"
          echo "==> SHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')"
          echo "==> Bundle ID: ${{
            inputs.bundle_id
          }}"

      - name: Upload build artifacts (packages - always)
        uses: actions/upload-artifact@v4
        with:
          name: ytliteplus-packages
          path: packages/
          if-no-files-found: error

      - name: Optional: Upload to Catbox
        if: ${{ inputs.catbox_upload }}
        shell: bash
        run: |
          set -euxo pipefail
          FILE="packages/$(ls -t packages | head -n1)"
          RESPONSE=$(curl -sS -F "reqtype=fileupload" -F "fileToUpload=@${FILE}" https://catbox.moe/user/api.php)
          CATBOX_URL=$(echo "$RESPONSE" | grep -o -E 'https://files.catbox.moe/[^"]*' || true)
          if [ -z "$CATBOX_URL" ]; then
            echo "::error::Catbox upload did not return a valid URL."
            exit 1
          fi
          echo "CATBOX_URL=$CATBOX_URL" >> "$GITHUB_ENV"
          echo "::notice title=Catbox::${CATBOX_URL}"

      - name: Create Draft GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}
          name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }} - YTLitePlus
          draft: true
          files: packages/*.ipa
          body: |
            YouTube (CFBundleVersion): ${{ env.YT_VERSION }}
            YTLite tag: ${{ env.YTLITE_VERSION }}
            Core Mode: ${{ inputs.core_mode }}
            Disable Profile: ${{ inputs.disable_profile }}

      - name: Job Summary
        shell: bash
        run: |
          {
            echo "### Build Complete"
            echo
            echo "- YouTube (CFBundleVersion): ${YT_VERSION}"
            echo "- YTLite tag: ${YTLITE_VERSION}"
            echo "- Core Mode: ${{ inputs.core_mode }}"
            echo "- Disable Profile: ${{ inputs.disable_profile }}"
          } >> "$GITHUB_STEP_SUMMARY"
