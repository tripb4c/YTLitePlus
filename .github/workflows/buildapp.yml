name: Build YTLitePlus (Original + Whitelist Prune)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL to your ArmConverter decrypted YouTube IPA"
        default: "https://example.com/YouTube_decrypted.ipa"
        required: true
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: true
        required: false
        type: boolean

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15-intel
    permissions:
      contents: read

    # Edit this line to add tweaks back safely (one at a time).
    # Start minimal, then expand: e.g., add |YTAB, |YouPiP, etc.
    env:
      WHITELIST_REGEX: "YTLitePlus|YTLite"

    steps:
      # 1) Toolchain -----------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make jq

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v3
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK (if cache miss)
        if: steps.sdk.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          ./theos-jailed/install

      - name: Put GNU make in PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo 'export PATH="/usr/local/opt/make/libexec/gnubin:$PATH"' >> ~/.bash_profile)
          source ~/.bash_profile || true

      # 2) Bring in your decrypted IPA (untouched) ----------------------------
      - name: Capture YT IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$URL_YT"
          echo "URL_YT=$URL_YT" >> "$GITHUB_ENV"

      - name: Prepare YouTube IPA (no stripping, no plist edits)
        run: |
          set -euxo pipefail
          mkdir -p tmp
          if ! wget "$URL_YT" --quiet -O YouTube.ipa ; then
            curl -L "$URL_YT" -o YouTube.ipa
          fi
          unzip -q YouTube.ipa -d tmp
          # Capture version for artifact name (best-effort)
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist" >/dev/null 2>&1 ; then
            ver=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist")
            echo "YT_VERSION=$ver" >> "$GITHUB_ENV"
          else
            echo "YT_VERSION=unknown" >> "$GITHUB_ENV"
          fi

      # 3) Build using the project's original Makefile ------------------------
      - name: Build (original scheme; we will repackage from stage)
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          export MAKEFLAGS=-j$(sysctl -n hw.ncpu)
          # Do NOT edit Makefile or strip PlugIns; preserve original behavior
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 | tee build.log || true
          echo "==> packages/ (from make, if any):"
          ls -lah packages || true

      # 4) Locate staged YouTube.app for pruning/packaging --------------------
      - name: Locate staged YouTube.app
        id: locate_stage
        run: |
          set -euxo pipefail
          APPDIR=
          if [ -d "tmp/Payload/YouTube.app" ]; then
            APPDIR="tmp/Payload/YouTube.app"
          elif [ -d ".theos/staging/Applications/YouTube.app" ]; then
            APPDIR=".theos/staging/Applications/YouTube.app"
          fi
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          test -n "$APPDIR"

      # 5) Whitelist: keep only essential dylibs; disable rest ----------------
      - name: Whitelist only essential dylibs for login (rename others to .off)
        run: |
          set -euxo pipefail
          APPDIR="${APPDIR:?}"
          echo "==> All injected dylibs under ${APPDIR}:"
