# Original idea by @ISnackable. Many thanks to him for handling the most hardest parts!
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release YTLitePlus

on:
  workflow_dispatch:
    inputs:
      ipa_source:
        description: "Where should we get the decrypted YouTube IPA URL?"
        required: true
        type: choice
        options:
          - Use secret (DROPBOX_IPA_URL)
          - Paste URL now
        default: Use secret (DROPBOX_IPA_URL)
      custom_url:
        description: "If choosing 'Paste URL now', paste a DIRECT link (Dropbox should end with ?dl=1)"
        required: false
        type: string

      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string

      decrypted_youtube_url:
        description: "(Unused when using the dropdown) Direct URL of the decrypted YouTube ipa"
        default: "https://files.catbox.moe/5a8qlt.ipa"
        required: true
        type: string

      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string

      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string

      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string

      upload_artifact:
        description: "Upload iPA as artifact (Public)"
        default: false
        required: false
        type: boolean

      catbox_upload:
        description: "Upload iPA to Catbox.moe (URL)"
        default: false
        required: false
        type: boolean

      create_release:
        description: "Create a draft release (Private)"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15-intel
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install ldid dpkg make jq curl unzip

      - name: Download Theos
        uses: actions/checkout@v6.0.1
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: iOS SDK Caching
        id: SDK
        uses: actions/cache@v5.0.2
        with:
          path: theos/sdks/
          key: iOS-${{ inputs.sdk_version }}-SDK
          restore-keys: iOS-${{ inputs.sdk_version }}-SDK

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          # Only download the specific SDK version
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download Theos Jailed
        uses: actions/checkout@v6.0.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Fix Compiling
        run: |
          # Update GNU Make to allow for faster building
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo export PATH="/usr/local/opt/make/libexec/gnubin:$PATH" >> ~/.bash_profile)
          source ~/.bash_profile
        env:
          THEOS: ${{ github.workspace }}/theos

      # === URL RESOLUTION WITH DROPDOWN (handles &amp; and forces Dropbox dl=1) ===
      - name: Resolve decrypted YouTube IPA URL (dropdown)
        id: resolve_url
        env:
          INPUT_CHOICE: ${{ github.event.inputs.ipa_source }}
          INPUT_URL: ${{ github.event.inputs.custom_url }}
          SECRET_URL: ${{ secrets.DROPBOX_IPA_URL }}
        run: |
          set -euo pipefail

          echo "Choice: ${INPUT_CHOICE}"

          if [[ "${INPUT_CHOICE}" == "Use secret (DROPBOX_IPA_URL)" ]]; then
            if [[ -z "${SECRET_URL:-}" ]]; then
              echo "Missing secret DROPBOX_IPA_URL. Add it under Repo Settings → Secrets and variables → Actions."
              exit 1
            fi
            RESOLVED_URL="${SECRET_URL}"
          else
            RESOLVED_URL="${INPUT_URL:-}"
            if [[ -z "${RESOLVED_URL}" ]]; then
              echo "You chose 'Paste URL now' but did not provide custom_url."
              exit 1
            fi
          fi

          # Unescape '&amp;' -> '&'
          RESOLVED_URL="${RESOLVED_URL//&amp;/&}"

          # Normalize Dropbox to a single dl=1 (force direct download)
          if [[ "$RESOLVED_URL" =~ ^https?://www\.dropbox\.com/ ]]; then
            RESOLVED_URL="$(python3 - <<'PY'
import sys, urllib.parse as u
url = sys.stdin.read().strip()
parts = u.urlparse(url)
q = u.parse_qs(parts.query, keep_blank_values=True)
q.pop('dl', None)
q['dl'] = ['1']
new = parts._replace(query=u.urlencode(q, doseq=True))
print(u.urlunparse(new))
PY
<<< "$RESOLVED_URL")"
          fi

          echo "::add-mask::${RESOLVED_URL}"
          echo "URL_YT=${RESOLVED_URL}" >> "$GITHUB_ENV"
          echo "decrypted_url=${RESOLVED_URL}" >> "$GITHUB_OUTPUT"

      - name: Prepare YouTube iPA
        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ env.URL_YT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          # Download and unzip iPA
          curl -L --fail --retry 5 --retry-delay 3 \
            -H "User-Agent: YTLitePlus-CI" \
            "$YOUTUBE_URL" -o YouTube.ipa

          # Ensure we didn't download an HTML page by mistake
          MIN_SIZE=$((10 * 1024 * 1024))
          ACT_SIZE=$(stat -f%z YouTube.ipa)
          if [ "$ACT_SIZE" -lt "$MIN_SIZE" ]; then
            echo "Downloaded file looks too small ($ACT_SIZE bytes)."
            echo "If using Dropbox, a direct link is required; the workflow normalizes to dl=1 automatically."
            exit 1
          fi

          unzip -q YouTube.ipa -d tmp

          # Get the YouTube app version from Info.plist
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' tmp/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> "$GITHUB_ENV"

          # Fetch the latest YTLite version from GitHub API (authenticated)
          YTLITE_VERSION=$(curl -sS --fail \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "User-Agent: YTLitePlus-CI" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dayanch96/YTLite/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')

          if [ -z "$YTLITE_VERSION" ] || [ "$YTLITE_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest YTLite version from GitHub API"
            exit 1
          fi
          echo "YTLITE_VERSION=$YTLITE_VERSION" >> "$GITHUB_ENV"
          echo "Fetched YTLite version: $YTLITE_VERSION"

          # Remove contents that interfere with sideloading
          rm -rf tmp/Payload/YouTube.app/_CodeSignature/CodeResources
          rm -rf tmp/Payload/YouTube.app/PlugIns/*

          # Modify Info.plist to remove UISupportedDevices
          python - <<'EOF'
          import plistlib
          filepath = 'tmp/Payload/YouTube.app/Info.plist'
          with open(filepath, 'rb') as f:
              plist = plistlib.load(f)
          plist.pop('UISupportedDevices', None)
          with open(filepath, 'wb') as f:
              plistlib.dump(plist, f)
          EOF

          # Manually install the Open in YouTube extension
          cp -R Extensions/*.appex tmp/Payload/YouTube.app/PlugIns

      - name: Build Package
        id: build_package
        env:
          THEOS: ${{ github.workspace }}/theos
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}
        run: |
          set -euxo pipefail
          # Replace lines in Makefile based on inputs
          sed -i '' "s/^BUNDLE_ID.*$/BUNDLE_ID = ${{ env.BUNDLE_ID }}/" Makefile
          sed -i '' "s/^DISPLAY_NAME.*$/DISPLAY_NAME = ${{ env.APP_NAME }}/" Makefile
          sed -i '' "s/^PACKAGE_VERSION.*$/PACKAGE_VERSION = ${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}/" Makefile
          sed -i '' "s/^export TARGET.*$/export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0/" Makefile
          sed -i '' "s|^export SDK_PATH.*$|export SDK_PATH = \$(THEOS)/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk/|" Makefile

          # Build the package
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 YTLITE_VERSION=${{ env.YTLITE_VERSION }}

          # Rename the package based on the version
          (mv "packages/$(ls -t packages | head -n1)" "packages/YTLitePlus_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}.ipa")

          # Pass package name to the upload step
          echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"

          # Print hash and bundle ID
          echo "==> SHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')"
          echo "==> Bundle ID: ${{ env.BUNDLE_ID }}"

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4.5.0
        with:
          name: YTLitePlus_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}
          path: packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Upload Artifact to Catbox and update AltStore repo
        if: ${{ inputs.catbox_upload }}
        env:
          CATBOX_FILE: ""
        run: |
          set -euxo pipefail
          RESPONSE=$(curl -F "reqtype=fileupload" -F "fileToUpload=@packages/${{ steps.build_package.outputs.package }}" https://catbox.moe/user/api.php)
          CATBOX_URL=$(echo "$RESPONSE" | grep -o -E 'https://files.catbox.moe/[^"]*' || true)
          if [ -z "$CATBOX_URL" ]; then
            echo "Catbox upload did not return a URL. Response: $RESPONSE"
            exit 1
          fi
          echo "Uploaded artifact to $CATBOX_URL"
          CATBOX_FILE=$(echo "$CATBOX_URL" | sed 's|https://files.catbox.moe/||')
          echo "CATBOX_FILE=$CATBOX_FILE" >> "$GITHUB_ENV"
          echo "CATBOX_URL=$CATBOX_URL" >> "$GITHUB_ENV"

          # Trigger Altstore source update via GitHub API using jq to build JSON
          jq -n \
            --arg ref "main" \
            --arg url "$CATBOX_URL" \
            --arg ylp "${{ env.YTLITE_VERSION }}" \
            --arg yv "${{ env.YT_VERSION }}" \
            '{ref:$ref, inputs:{yt_lite_plus_url:$url, yt_lite_plus_version:$ylp, yt_version:$yv}}' \
          | curl -sS -X POST \
              -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data-binary @- \
              "https://api.github.com/repos/Balackburn/YTLitePlusAltstore/actions/workflows/update_source.yml/dispatches"

      - name: Prepare Release Notes
        if: ${{ inputs.create_release }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          sed "s/%ytliteplus_version%/${{ env.YTLITE_VERSION }}/g; s/%youtube_version%/${{ env.YT_VERSION }}/g; s/%catbox_url%/${{ env.CATBOX_FILE }}/g; s/%date%/$TODAY/g" \
            .github/RELEASE_TEMPLATE/Release.md > release_notes.md

      - name: Create Draft Release
        if: ${{ inputs.create_release }}
        id: create_release
        uses: softprops/action-gh-release@v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }}
          name: v${{ env.YT_VERSION }}-${{ env.YTLITE_VERSION }} - YTLitePlus
          files: packages/*.ipa
          draft: true
          body_path: release_notes.md

      - name: Job Summary
        run: |
          {
            echo '### Build Complete'
            echo
            echo "YouTube: ${YT_VERSION}"
            echo "YTLite:  ${YTLITE_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Job Summary - Artifact Upload
        if: ${{ inputs.upload_artifact }}
        run: |
          {
            echo '### Artifact Upload'
            echo
            echo 'The artifact was uploaded successfully! Open the run and scroll to the "Artifacts" section to download it.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Job Summary - Catbox Upload
        if: ${{ inputs.catbox_upload }}
        run: |
          {
            echo '### Catbox Upload'
            echo
            echo "Permanent link: ${CATBOX_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
