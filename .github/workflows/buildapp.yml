name: Build YTLitePlus (Light • Artifact only)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of your ArmConverter decrypted YouTube IPA"
        default: "https://example.com/path/to/YouTube_decrypted.ipa"
        required: true
        type: string

jobs:
  build:
    name: Build YTLitePlus (Light)
    runs-on: macos-15-intel
    permissions:
      contents: read   # no writes back to the repo

    steps:
      # --- 1) Toolchain -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make jq

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v3
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK (if cache miss)
        if: steps.sdk.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          ./theos-jailed/install

      - name: Put GNU make in PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo 'export PATH="/usr/local/opt/make/libexec/gnubin:$PATH"' >> ~/.bash_profile)
          source ~/.bash_profile || true

      # --- 2) Bring in your decrypted IPA (untouched) -------------------------
      - name: Capture your decrypted IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$URL_YT"
          echo "URL_YT=$URL_YT" >> "$GITHUB_ENV"

      - name: Prepare YouTube IPA (no stripping, no plist edits)
        run: |
          set -euxo pipefail
          mkdir -p tmp
          if ! wget "$URL_YT" --quiet -O YouTube_decrypted.ipa ; then
            curl -L "$URL_YT" -o YouTube_decrypted.ipa
          fi
          unzip -q YouTube_decrypted.ipa -d tmp

          # Best-effort: capture base YouTube version for naming
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist" >/dev/null 2>&1 ; then
            ver=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist")
            echo "YT_VERSION=$ver" >> "$GITHUB_ENV"
          else
            echo "YT_VERSION=unknown" >> "$GITHUB_ENV"
          fi

      # --- 3) Fetch YTLite core ------------------------------------------------
      - name: Fetch YTLite core (latest release)
        run: |
          set -euxo pipefail
          mkdir -p Tweaks/YTLite
          YTLITE_VERSION=$(curl -s https://api.github.com/repos/dayanch96/YTLite/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          test -n "$YTLITE_VERSION"
          echo "YTLITE_VERSION=$YTLITE_VERSION" >> "$GITHUB_ENV"
          curl -L -o Tweaks/YTLite/ytlite.deb "https://github.com/dayanch96/YTLite/releases/download/v${YTLITE_VERSION}/com.dvntm.ytlite_${YTLITE_VERSION}_iphoneos-arm64.deb"
          tar -xf Tweaks/YTLite/ytlite.deb -C Tweaks/YTLite || true
          tar -xf Tweaks/YTLite/data.tar* -C Tweaks/YTLite
          test -f Tweaks/YTLite/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib

      # --- 4) Provide a tiny Theos project (inject YTLite only) ----------------
      - name: Provide minimal Makefile + files (no heredocs)
        shell: bash
        run: |
          set -euo pipefail

          # Makefile
          {
            printf '%s\n' 'export TARGET = iphone:clang:18.6:14.0'
            printf '%s\n' 'export SDK_PATH = $(THEOS)/sdks/iPhoneOS18.6.sdk/'
            printf '%s\n' 'export SYSROOT = $(SDK_PATH)'
            printf '%s\n' 'export ARCHS = arm64'
            printf '%s\n' ''
            printf '%s\n' 'PACKAGE_NAME = YTLitePlus'
            printf '%s\n' 'PACKAGE_VERSION = 1.0'
            printf '%s\n' 'INSTALL_TARGET_PROCESSES = YouTube'
            printf '%s\n' 'TWEAK_NAME = YTLitePlus'
            printf '%s\n' ''
            printf '%s\n' 'DISPLAY_NAME = YouTube'
            printf '%s\n' 'BUNDLE_ID    = com.google.ios.youtube'
            printf '%s\n' ''
            printf '%s\n' 'YTLitePlus_FILES = dummy.m'
            printf '%s\n' 'YTLitePlus_FRAMEWORKS = UIKit Security'
            printf '%s\n' ''
            printf '%s\n' 'YTLitePlus_INJECT_DYLIBS = Tweaks/YTLite/var/jb/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib'
            printf '%s\n' ''
            printf '%s\n' 'YTLitePlus_CFLAGS = -fobjc-arc'
            printf '%s\n' 'YTLitePlus_IPA = ./tmp/Payload/YouTube.app'
            printf '%s\n' ''
            printf '%s\n' 'include $(THEOS)/makefiles/common.mk'
            printf '%s\n' 'include $(THEOS_MAKE_PATH)/tweak.mk'
            printf '%s\n' ''
            printf '%s\n' 'FINALPACKAGE = 1'
            printf '%s\n' 'CODESIGN_IPA = 0'
          } > Makefile

          # dummy.m
          printf '%s\n' '// intentionally empty' > dummy.m

          # Filter plist (inject into stock bundle id)
          {
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            printf '%s\n' '<plist version="1.0"><dict>'
            printf '%s\n' '  <key>Filter</key><dict>'
            printf '%s\n' '    <key>Bundles</key><array><string>com.google.ios.youtube</string></array>'
            printf '%s\n' '  </dict>'
            printf '%s\n' '</dict></plist>'
          } > YTLitePlus.plist

          # Debian control (required by make package)
          {
            printf '%s\n' 'Package: com.tripb4c.ytliteplus.light'
            printf '%s\n' 'Name: YTLitePlus-Light'
            printf '%s\n' 'Version: 1.0'
            printf '%s\n' 'Architecture: iphoneos-arm64'
            printf '%s\n' 'Description: YouTube + YTLite core only (light build)'
            printf '%s\n' 'Maintainer: Isaac <you@example.com>'
            printf '%s\n' 'Author: Isaac <you@example.com>'
            printf '%s\n' 'Section: Tweaks'
            printf '%s\n' 'Priority: optional'
            printf '%s\n' 'Depends: firmware (>= 14.0)'
          } > control

      # --- 5) Build and guarantee an IPA artifact ------------------------------
      - name: Build Package (Theos) — with fallback zipper
        id: build_package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          export MAKEFLAGS=-j$(sysctl -n hw.ncpu)
          rm -rf packages && mkdir -p packages
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 | tee build.log

          # If Theos already produced an IPA:
          if ls packages/*.ipa >/dev/null 2>&1 ; then
            echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: zip staged Payload (contains our injected changes)
          if [ -d "tmp/Payload/YouTube.app" ] ; then
            pushd tmp >/dev/null
            /usr/bin/zip -qry ../packages/YTLitePlus_light_${YT_VERSION}_${YTLITE_VERSION}.ipa Payload
            popd >/dev/null
            echo "package=$(ls -t packages | head -n1)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ERROR: No IPA produced and no staged app found."
          echo "package=" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLitePlus_light_${{ env.YT_VERSION }}_${{ env.YTLITE_VERSION }}
          path: packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error
