name: Build YTLitePlus (Original + Whitelist + Always Upload)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL to your ArmConverter decrypted YouTube IPA"
        default: "https://example.com/YouTube_decrypted.ipa"
        required: true
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: true
        required: false
        type: boolean

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15-intel
    permissions:
      contents: read

    # ⬇️ Expanded whitelist:
    # - Core: YTLitePlus, YTLite
    # - AB/sideload helpers: YTAB, ABConfig, ABGoodies, Sideload, Spoof, VersionSpoofer
    # - Network/privacy helpers used around login: NoTracking, NoCheckLocal
    # - Low-risk UI/login-adjacent helpers: YouPiP, YTVideoOverlay, RememberCaption, Miniplayer, Speed, Shorts, DontEatMyContent
    env:
      WHITELIST_REGEX: "YTLitePlus|YTLite|YTAB|ABConfig|ABGoodies|Sideload|Spoof|VersionSpoofer|NoTracking|NoCheckLocal|YouPiP|YTVideoOverlay|RememberCaption|Miniplayer|Speed|Shorts|DontEatMyContent"

    steps:
      # 1) Toolchain -----------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make jq

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v3
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK (if cache miss)
        if: steps.sdk.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/
          cd sdks
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          ./theos-jailed/install

      - name: Put GNU make in PATH
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          (echo 'export PATH="/usr/local/opt/make/libexec/gnubin:$PATH"' >> ~/.bash_profile)
          source ~/.bash_profile || true

      # 2) Bring in your decrypted IPA (untouched) ----------------------------
      - name: Capture YT IPA URL
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$URL_YT"
          echo "URL_YT=$URL_YT" >> "$GITHUB_ENV"

      - name: Prepare YouTube IPA (no stripping, no plist edits)
        run: |
          set -euxo pipefail
          mkdir -p tmp
          if ! wget "$URL_YT" --quiet -O YouTube.ipa ; then
            curl -L "$URL_YT" -o YouTube.ipa
          fi
          unzip -q YouTube.ipa -d tmp
          # Capture version for artifact name (best-effort)
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist" >/dev/null 2>&1 ; then
            ver=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "tmp/Payload/YouTube.app/Info.plist")
            echo "YT_VERSION=$ver" >> "$GITHUB_ENV"
          else
            echo "YT_VERSION=unknown" >> "$GITHUB_ENV"
          fi

      # 3) Build using the project's original Makefile ------------------------
      - name: Build (original scheme)
        id: theos_build
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euxo pipefail
          export MAKEFLAGS=-j$(sysctl -n hw.ncpu)
          rm -rf packages && mkdir -p packages
          # Preserve original behavior; no Makefile sed; no PlugIns stripping
          make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 | tee build.log || true

          echo "==> packages/ (after make):"
          ls -lah packages || true
          echo "==> .theos/staging top:"
          find .theos/staging -maxdepth 3 -type d -print | head -n 30 || true
          echo "==> tmp/Payload top:"
          find tmp/Payload -maxdepth 3 -type d -print || true

          if ls packages/*.ipa >/dev/null 2>&1; then
            echo "ipa_ready=1" >> "$GITHUB_OUTPUT"
            echo "built_ipa=$(ls -t packages/*.ipa | head -n1)" >> "$GITHUB_OUTPUT"
          else
            echo "ipa_ready=0" >> "$GITHUB_OUTPUT"
          fi

      # 4) Locate staged YouTube.app (where we will prune) --------------------
      - name: Locate staged YouTube.app
        id: locate_stage
        run: |
          set -euxo pipefail
          APPDIR=
          if [ -d "tmp/Payload/YouTube.app" ]; then
            APPDIR="tmp/Payload/YouTube.app"
          fi
          if [ -d ".theos/staging/Applications/YouTube.app" ]; then
            APPDIR=".theos/staging/Applications/YouTube.app"
          fi
          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"
          if [ -z "$APPDIR" ]; then
            echo "ERROR: No staged YouTube.app found in tmp/ or .theos/staging/"
            exit 1
          fi
          echo "Using APPDIR=$APPDIR"

      # 5) Whitelist: keep only essential dylibs; disable rest ----------------
      - name: Whitelist dylibs (keep regex, disable others)
        run: |
          set -euxo pipefail
          APPDIR="${APPDIR:?}"

          echo "==> All injected dylibs under ${APPDIR}:"
          find "$APPDIR" -type f -name "*.dylib" | sort | tee all_dylibs.txt || true

          echo "==> Keeping libs that match: ${WHITELIST_REGEX}"
          if [ -s all_dylibs.txt ]; then
            while IFS= read -r f; do
              base="$(basename "$f")"
              if echo "$base" | grep -Eq "${WHITELIST_REGEX}"; then
                echo "KEEP   : $base"
                # If previously disabled, restore it
                if [ -f "${f}.off" ]; then mv "${f}.off" "$f" || true; fi
              else
                echo "DISABLE: $base"
                if [ ! -f "${f}.off" ]; then mv "$f" "${f}.off" || true; fi
              fi
            done < all_dylibs.txt
          fi

          echo "==> Active dylibs after whitelist:"
          find "$APPDIR" -type f -name "*.dylib" -print | sed 's/^/  /' || true

      # 6) Always produce a final IPA -----------------------------------------
      - name: Package final IPA (from stage if needed)
        id: package
        run: |
          set -euxo pipefail
          mkdir -p packages

          if [ "${{ steps.theos_build.outputs.ipa_ready }}" = "1" ]; then
            # Prefer the pruned-from-stage output so the whitelist applies
            if [ -d "tmp/Payload/YouTube.app" ]; then
              (cd tmp && /usr/bin/zip -qry ../packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload)
              FINAL="packages/YTLitePlus_pruned_${YT_VERSION}.ipa"
            elif [ -d ".theos/staging/Applications/YouTube.app" ]; then
              rm -rf Payload && mkdir -p Payload
              cp -a .theos/staging/Applications/YouTube.app Payload/
              /usr/bin/zip -qry packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload
              rm -rf Payload
              FINAL="packages/YTLitePlus_pruned_${YT_VERSION}.ipa"
            else
              FINAL="${{ steps.theos_build.outputs.built_ipa }}"
            fi
          else
            if [ -d "tmp/Payload/YouTube.app" ]; then
              (cd tmp && /usr/bin/zip -qry ../packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload)
              FINAL="packages/YTLitePlus_pruned_${YT_VERSION}.ipa"
            elif [ -d ".theos/staging/Applications/YouTube.app" ]; then
              rm -rf Payload && mkdir -p Payload
              cp -a .theos/staging/Applications/YouTube.app Payload/
              /usr/bin/zip -qry packages/YTLitePlus_pruned_${YT_VERSION}.ipa Payload
              rm -rf Payload
              FINAL="packages/YTLitePlus_pruned_${YT_VERSION}.ipa"
            else
              echo "ERROR: Couldn't find staged app to zip."
              exit 1
            fi
          fi

          ls -lah packages || true
          test -f "$FINAL"
          echo "package=$FINAL" >> "$GITHUB_OUTPUT"
          echo "### Base YouTube Version: ${YT_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "### Whitelist regex: ${WHITELIST_REGEX}" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifact: ${FINAL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: YTLitePlus_build_${{ env.YT_VERSION }}
          path: ${{ steps.package.outputs.package }}
          if-no-files-found: error

      - name: Upload packages folder (diagnostic)
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: packages_diagnostics_${{ env.YT_VERSION }}
          path: packages/
          if-no-files-found: warn
