name: Build and Release YTLitePlus

on:
  workflow_dispatch:
    inputs:
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA (Catbox/Dropbox/etc.)"
        default: "https://files.catbox.moe/5a8qlt.ipa"
        required: true
        type: string
      bundle_id:
        description: "Bundle identifier to use"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "App display name"
        default: "YouTube"
        required: true
        type: string
      sdk_version:
        description: "iOS SDK version to build against"
        default: "18.6"
        required: true
        type: string
      ytlite_version:
        description: "(Optional) Pin a YTLite tag (e.g., 5.1.3). Leave blank for latest."
        default: ""
        required: false
        type: string
      core_mode:
        description: "Core mode"
        required: true
        type: choice
        options:
          - "Full"
          - "Core-Lite (safer)"
        default: "Core-Lite (safer)"
      disable_profile:
        description: "Disable a set of tweaks (regex applied to built dylibs)"
        required: true
        type: choice
        options:
          - "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)"
          - "Minimal (stable baseline)"
          - "Disable Group A (UI/Settings)"
          - "Disable Group B (Playback/PiP/RYD/FLEX)"
          - "None (enable everything)"
          - "Custom (use custom_disable_regex)"
        default: "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)"
      custom_disable_regex:
        description: "If Custom, regex of dylib names to disable (e.g. YTUHD|YouPiP)"
        required: false
        type: string
      create_release:
        description: "Create a draft GitHub Release"
        default: true
        required: false
        type: boolean
      catbox_upload:
        description: "Upload IPA to Catbox (optional)"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTLitePlus
    runs-on: macos-15
    permissions:
      contents: write

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          brew update
          brew install jq curl unzip ldid dpkg gnu-sed make
          # Put GNU make 'gnubin' first so 'make' is GNU make
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 13c22376b5d83ff759c1993de0a861e673aa522b
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk_cache
        uses: actions/cache@v4
        with:
          path: theos/sdks/
          key: iphoneos-${{ inputs.sdk_version }}-sdk

      - name: Fetch iOS SDK (if cache missed)
        if: steps.sdk_cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          git clone -n --depth=1 --filter=tree:0 https://github.com/aricloverEXTRA/sdks/ sdks-src
          cd sdks-src
          git sparse-checkout set --no-cone "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Download Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          set -euxo pipefail
          ./theos-jailed/install

      - name: Normalize decrypted IPA URL
        id: urlprep
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ inputs.decrypted_youtube_url }}"
          # Unescape '&amp;' to '&'
          RAW="${RAW//&amp;/&}"
          # Force Dropbox direct download for any www.dropbox.com link (including scl/fi)
          if [[ "$RAW" =~ ^https?://www\.dropbox\.com/ ]]; then
            BASE="${RAW%%\?*}"
            RAW="${BASE}?dl=1"
          fi
          echo "YOUTUBE_URL=$RAW" >> "$GITHUB_ENV"
          echo "::add-mask::$RAW"

      - name: Download and unpack YouTube IPA
        shell: bash
        run: |
          set -euxo pipefail
          # Guard URL
          if [ -z "${YOUTUBE_URL:-}" ]; then
            echo "::error::YOUTUBE_URL is empty. URL normalization step didn’t export it."; exit 1
          fi
          echo "YOUTUBE_URL starts with: ${YOUTUBE_URL:0:80}..."

          # Download with headers captured
          rm -f YouTube.ipa headers.txt
          curl -L --fail --retry 5 --retry-delay 3 \
            -D headers.txt \
            -H "User-Agent: YTLitePlus-CI" \
            "${YOUTUBE_URL}" -o YouTube.ipa

          echo "==> Response headers (first lines):"
          sed -n '1,20p' headers.txt || true

          # Content-Type sanity: HTML indicates landing page
          if grep -qiE '^Content-Type:\s*text/html' headers.txt; then
            echo "::error::Server returned text/html (likely a landing page). Check the link or ensure Dropbox ends with ?dl=1."
            exit 1
          fi

          # Size sanity: >10MB
          MIN=$((10*1024*1024))
          ACT=$(stat -f%z YouTube.ipa)
          if [ "$ACT" -lt "$MIN" ]; then
            echo "::error::Downloaded IPA is too small ($ACT bytes) — likely an HTML/error page."
            exit 1
          fi

          # Unpack + validate
          unzip -q YouTube.ipa -d tmp
          test -d tmp/Payload/YouTube.app || { echo "::error::YouTube.app missing in IPA"; exit 1; }

          # Parse CFBundleVersion (inline python; YAML-safe)
          YT_VERSION=$(python3 -c 'import plistlib; p="tmp/Payload/YouTube.app/Info.plist"; print(plistlib.load(open(p,"rb")).get("CFBundleVersion","0"))')
          echo "YT_VERSION=${YT_VERSION}" >> "$GITHUB_ENV"

          # Remove signature + plugins (avoid resign issues)
          rm -rf tmp/Payload/YouTube.app/_CodeSignature || true
          rm -rf tmp/Payload/YouTube.app/PlugIns/* || true

          # Remove UISupportedDevices (some SDKs choke on it)
          python3 -c 'import plistlib; p="tmp/Payload/YouTube.app/Info.plist"; pl=plistlib.load(open(p,"rb")); pl.pop("UISupportedDevices",None); plistlib.dump(pl,open(p,"wb"))'

          # Re-add local Extensions if present
          if [ -d "Extensions" ] && compgen -G "Extensions/*.appex" > /dev/null; then
            mkdir -p tmp/Payload/YouTube.app/PlugIns
            cp -R Extensions/*.appex tmp/Payload/YouTube.app/PlugIns || true
          fi

      - name: Pre-download YTLite .deb (pinned or latest) and verify
        id: ytlitedeb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          owner="dayanch96"
          repo="YTLite"

          if [ -n "${{ inputs.ytlite_version }}" ]; then
            tag="v${{ inputs.ytlite_version }}"
          else
            tag="$(curl -sS --fail \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${owner}/${repo}/releases/latest" \
              | jq -r '.tag_name')"
          fi
          echo "Using YTLite tag: $tag"
          echo "YTLITE_VERSION=${tag#v}" >> "$GITHUB_ENV"

          rel_json="$(curl -sS --fail \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}")"

          api_url="$(echo "$rel_json" | jq -r '.assets[] | select(.name|endswith(".deb")) | .url' | head -n1)"
          test -n "$api_url"

          mkdir -p Tweaks/YTLite
          curl -L --fail --retry 5 --retry-delay 3 \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$api_url" -o Tweaks/YTLite/YTLite.deb

          file Tweaks/YTLite/YTLite.deb | grep -qi 'debian' || { echo "::error::Downloaded file is not a Debian archive"; exit 1; }

      - name: Decide disabled dylib regex from profile
        id: disable
        shell: bash
        run: |
          set -euo pipefail
          CHOICE="${{ inputs.disable_profile }}"
          CUSTOM="${{ inputs.custom_disable_regex }}"
          case "$CHOICE" in
            "Login-friendly (disable Group B: Playback/PiP/RYD/FLEX)")
              DISABLE="YTUHD|YouPiP|YouTubeDislikesReturn|libFLEX"
              ;;
            "Minimal (stable baseline)")
              DISABLE="libFLEX|YTUHD|YouPiP|YouGroupSettings|YTVideoOverlay|YouTimeStamp|DontEatMyContent|YTABConfig|YouTubeDislikesReturn"
              ;;
            "Disable Group A (UI/Settings)")
              DISABLE="YTVideoOverlay|YouGroupSettings|YTABConfig|YouTimeStamp|DontEatMyContent"
              ;;
            "Disable Group B (Playback/PiP/RYD/FLEX)")
              DISABLE="YTUHD|YouPiP|YouTubeDislikesReturn|libFLEX"
              ;;
            "None (enable everything)")
              DISABLE=""
              ;;
