name: Build YTLitePlus

on:
  workflow_dispatch:
    inputs:
      ipa_source:
        description: "Choose where to get the decrypted YouTube IPA URL"
        required: true
        type: choice
        options:
          - Use secret (DROPBOX_IPA_URL)
          - Paste URL now
        default: Use secret (DROPBOX_IPA_URL)
      custom_url:
        description: "If 'Paste URL now', enter your Dropbox direct link (must end with ?dl=1)"
        required: false
        type: string

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        set -euxo pipefail
        brew install dpkg ldid jq curl unzip || true

    - name: Resolve decrypted IPA URL
      id: resolve_url
      env:
        INPUT_CHOICE: ${{ github.event.inputs.ipa_source }}
        INPUT_URL: ${{ github.event.inputs.custom_url }}
        SECRET_URL: ${{ secrets.DROPBOX_IPA_URL }}
      run: |
        set -euo pipefail

        echo "Choice: ${INPUT_CHOICE}"

        # Select source based on dropdown
        if [[ "${INPUT_CHOICE}" == "Use secret (DROPBOX_IPA_URL)" ]]; then
          if [[ -z "${SECRET_URL:-}" ]]; then
            echo "Missing secret DROPBOX_IPA_URL. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          URL="${SECRET_URL}"
        else
          if [[ -z "${INPUT_URL:-}" ]]; then
            echo "You chose 'Paste URL now' but did not provide custom_url."
            exit 1
          fi
          URL="${INPUT_URL}"
        fi

        # Force Dropbox direct download if needed
        if [[ "${URL}" =~ ^https?://www\.dropbox\.com/ ]] && [[ ! "${URL}" =~ \?dl=1$ ]]; then
          if [[ "${URL}" =~ \?dl=0$ ]]; then
            URL="${URL%?dl=0}?dl=1"
          elif [[ "${URL}" =~ \?dl= ]]; then
            # Keep existing params, append &dl=1
            URL="${URL}&dl=1"
          else
            URL="${URL}?dl=1"
          fi
        fi

        echo "Resolved URL (masked in logs)."
        echo "DECRYPTED_IPA_URL=${URL}" >> "$GITHUB_OUTPUT"

    - name: Download decrypted YouTube IPA
      env:
        URL: ${{ steps.resolve_url.outputs.DECRYPTED_IPA_URL }}
      run: |
        set -euxo pipefail
        mkdir -p tmp
        curl -L --fail --retry 5 --retry-delay 3 \
          -H "User-Agent: YTLitePlus-CI" \
          "$URL" -o tmp/YouTube.ipa

        # Sanity check: IPA is a zip and not an HTML page
        MIN_SIZE=$((10 * 1024 * 1024))
        ACT_SIZE=$(stat -f%z tmp/YouTube.ipa)
        if [ "$ACT_SIZE" -lt "$MIN_SIZE" ]; then
          echo "Downloaded file looks too small ($ACT_SIZE bytes)."
          echo "If using Dropbox, ensure the link ends with ?dl=1."
          exit 1
        fi

    - name: Extract IPA into tmp/Payload/YouTube.app
      run: |
        set -euxo pipefail
        rm -rf tmp/Payload
        unzip -q tmp/YouTube.ipa -d tmp
        test -d tmp/Payload/YouTube.app || { echo "YouTube.app not found in IPA"; ls -lah tmp; exit 1; }

    - name: Fetch latest YTLite tag (GitHub API)
      id: ytlite
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euxo pipefail
        TAG=$(curl -sS --fail \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "User-Agent: YTLitePlus-CI" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/YTLite/YTLite/releases/latest \
          | jq -r '.tag_name')
        [ -n "$TAG" ] && [ "$TAG" != "null" ] || { echo "Could not resolve YTLite latest tag"; exit 1; }
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Using YTLITE_VERSION=$TAG"

    - name: Build (inject tweaks + package)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISABLE_DYLIBS_REGEX: "libFLEX|YTUHD|YouPiP|YouGroupSettings|YTVideoOverlay"
      run: |
        set -euxo pipefail
        export MAKEFLAGS=-j$(($(sysctl -n hw.ncpu)-1))
        rm -rf packages && mkdir -p packages

        # Build with the resolved YTLite version
        make package SIDELOAD=1 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 \
          YTLITE_VERSION="${{ steps.ytlite.outputs.tag }}" | tee build.log

        ls -lah packages || true
        ls packages/*.ipa >/dev/null 2>&1 || { echo "ERROR: No IPA produced by Theos"; exit 1; }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ytliteplus-output
        path: |
          packages/
          build.log
          tmp/Payload/YouTube.app/**
